<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in, Nisria Grant Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
            min-height: 100vh;
        }
        .login-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 1.5rem 3rem rgba(0, 0, 0, 0.25);
        }
        .brand-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.9rem;
            border-radius: 999px;
            background: rgba(13, 27, 42, 0.08);
            color: #0d1b2a;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <main class="d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="container" style="max-width: 28rem;">
            <div class="card login-card">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <span class="brand-pill">
                            <i class="bi bi-search-heart"></i> Nisria Grants
                        </span>
                        <h1 class="h4 mt-3 mb-1">Sign in</h1>
                        <p class="text-muted small mb-0">
                            Private workspace for the Nisria Foundation team.
                        </p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <div>Wrong email or password.</div>
                    </div>
                    {% endif %}

                    <form method="post" action="/login" autocomplete="on">
                        {% if next %}
                        <input type="hidden" name="next" value="{{ next }}">
                        {% endif %}

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input
                                type="email"
                                class="form-control form-control-lg"
                                id="email"
                                name="email"
                                autocomplete="username"
                                required
                                autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input
                                type="password"
                                class="form-control form-control-lg"
                                id="password"
                                name="password"
                                autocomplete="current-password"
                                required>
                        </div>

                        <button type="submit" class="btn btn-dark btn-lg w-100">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
                        </button>
                    </form>
                </div>
            </div>

            <p class="text-center text-white-50 small mt-4 mb-0">
                Nisria Foundation, internal tool.
            </p>
        </div>
    </main>
</body>
</html>
